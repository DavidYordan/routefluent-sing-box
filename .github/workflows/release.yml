name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build
        run: python3 build_routefluent_sing_box.py

      - name: Smoke check
        run: |
          ./dist/sing-box-linux-amd64 version
          ./dist/sing-box-linux-amd64 check -c testdata/anytls-client-check.json
          ./dist/sing-box-linux-amd64 check -c testdata/routefluent-dns-resolver-group-check.json
          ./dist/sing-box-linux-amd64 check -c testdata/routefluent-dns-doh-bootstrap-check.json
          if ./dist/sing-box-linux-amd64 check -c testdata/routefluent-dns-invalid-primary-local.json; then
            echo "invalid local primary resolver unexpectedly passed"
            exit 1
          fi
          if ./dist/sing-box-linux-amd64 check -c testdata/routefluent-dns-invalid-fallback-https.json; then
            echo "invalid HTTPS fallback resolver unexpectedly passed"
            exit 1
          fi
          if ./dist/sing-box-linux-amd64 check -c testdata/routefluent-dns-invalid-fallback-missing-probes.json; then
            echo "fallback without probe_domains unexpectedly passed"
            exit 1
          fi
          python3 scripts/routefluent_dns_runtime_smoke.py --sing-box ./dist/sing-box-linux-amd64

      - name: Write checksums
        run: |
          cd dist
          sha256sum sing-box-linux-amd64 sing-box-linux-amd64.routefluent-anytls-client.json > SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: routefluent-sing-box-linux-amd64
          path: |
            dist/sing-box-linux-amd64
            dist/sing-box-linux-amd64.routefluent-anytls-client.json
            dist/SHA256SUMS

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sing-box-linux-amd64
            dist/sing-box-linux-amd64.routefluent-anytls-client.json
            dist/SHA256SUMS
